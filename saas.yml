# saas.yml — Docker Compose for Hostinger SaaS deployment
# Usage: docker compose -f saas.yml up -d
#
# Required environment variables (set in .env.production):
#   DATABASE_URL         PostgreSQL connection URL (Supabase)
#   DJANGO_SECRET_KEY    Random 50-char secret
#   DJANGO_DEBUG         false
#   DJANGO_ALLOWED_HOSTS your-domain.com,www.your-domain.com
#   SUPABASE_URL         Your Supabase project URL
#   SUPABASE_ANON_KEY    Supabase anon key (for API validation)
#   SUPABASE_SERVICE_KEY Supabase service role key (for server-side ops)

version: "3.9"

services:
  # ── Web / API ──────────────────────────────────────────────────────────────
  web:
    image: ghcr.io/eracle/openoutreach:latest
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py setup_crm &&
             python manage.py collectstatic --noinput &&
             gunicorn linkedin.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=false
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    restart: unless-stopped

  # ── Nginx (serves frontend + proxies to Django) ───────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/saas.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - ./dist:/app/frontend:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    restart: unless-stopped

  # ── Worker Manager (Supervisor for per-tenant daemons) ────────────────────
  worker-manager:
    image: ghcr.io/eracle/openoutreach:latest
    command: supervisord -c /app/supervisord.conf
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    volumes:
      - worker_data:/app/data
      - /tmp/openoutreach-diagnostics:/tmp/openoutreach-diagnostics
    shm_size: "256m"
    restart: unless-stopped

volumes:
  static_files:
  media_files:
  worker_data:
  letsencrypt:
